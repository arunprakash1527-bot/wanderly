<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1B8F6A" />
    <meta name="description" content="Plan group trips together with AI-powered itineraries, expense splitting, and shared memories" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />

    <!-- Apple PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TripWithMe" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Splash screen colour while loading -->
    <style>
      html, body { margin: 0; padding: 0; background: #FAF9F6; }
      #splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; background: #FAF9F6; z-index: 99999; transition: opacity .3s; }
      #splash h1 { font-family: Georgia, serif; font-size: 22px; font-weight: 400; color: #1A1A18; }
      #splash p { font-size: 11px; color: #767570; }
    </style>

    <title>Trip With Me</title>
  </head>
  <body>
    <div id="splash">
      <h1>Trip With Me</h1>
      <p>Loading...</p>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Remove splash once React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) { splash.style.opacity = '0'; setTimeout(function() { splash.remove(); }, 300); }
        }, 200);
      });
    </script>
  </body>
</html>
